    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        #wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video#player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        #main {
            text-align: center;
            z-index: 1;
        }

        /* --- АНИМАЦИЯ ЗАГОЛОВКА --- */
        h1 {
            font-size: 4rem;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            
            /* Настраиваем анимацию */
            animation: xenoglow 3s ease-in-out infinite; 
            color: #fff; /* Начальный цвет */
        }

        /* Сценарий анимации */
        @keyframes xenoglow {
            0% {
                color: #fff;
                text-shadow: 0 0 5px #fff, 0 0 10px #fff; /* Тускло */
            }
            50% {
                color: #39ff14; /* Ядовито-зеленый цвет текста */
                text-shadow: 
                    0 0 5px #fff, 
                    0 0 10px #fff, 
                    0 0 20px #39ff14, 
                    0 0 40px #39ff14, 
                    0 0 60px #39ff14; /* Яркое свечение */
            }
            100% {
                color: #fff;
                text-shadow: 0 0 5px #fff, 0 0 10px #fff; /* Снова тускло */
            }
        }

        #doc_time {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 20px;
            color: #ccc;
        }

        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav ul li a {
            font-size: 2rem;
            color: #fff;
            transition: color 0.3s, transform 0.3s;
            display: inline-block;
        }

        nav ul li a:hover {
            color: #39ff14; /* При наведении тоже зеленый */
            transform: scale(1.2);
            text-shadow: 0 0 15px #39ff14;
        }

        /* Бегущая строка */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            margin: 20px 0;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 10s linear infinite;
            font-size: 1.2rem;
            color: #888;
        }

        @keyframes marquee {
            0%   { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            nav ul li a { font-size: 1.5rem; }
        }
    </style>

    <script type="text/javascript">
        function clock() {
            const d = new Date();
            const hours = String(d.getHours()).padStart(2, '0');
