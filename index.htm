    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Чтобы не было прокрутки */
        }

        /* Видео на весь экран */
        video#player {
            position: fixed; /* Фиксируем видео */
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translateX(-50%) translateY(-50%); /* Центрируем */
            background-size: cover;
        }

        #overlay {
            position: fixed; /* Фиксируем затемнение */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        #main {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- АНИМАЦИЯ И РАЗМЕР ЗАГОЛОВКА --- */
        h1 {
            font-size: 7rem; 
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: xenoglow 3s ease-in-out infinite; 
            color: #fff;
        }

        @keyframes xenoglow {
            0% { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #fff; }
            50% { color: #39ff14; text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #39ff14, 0 0 40px #39ff14, 0 0 60px #39ff14; }
            100% { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #fff; }
        }

        #doc_time {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 20px;
            color: #ccc;
        }

        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav ul li a {
            font-size: 2rem;
            color: #fff;
            transition: color 0.3s, transform 0.3s;
            display: inline-block;
        }

        nav ul li a:hover {
            color: #39ff14;
            transform: scale(1.2);
            text-shadow: 0 0 15px #39ff14;
        }

        /* Кнопка звука */
        #sound-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 5px;
            transition: background 0.3s;
            z-index: 10;
        }
        #sound-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Бегущая строка */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            margin: 20px 0;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 10s linear infinite;
            font-size: 1.2rem;
            color: #888;
        }

        @keyframes marquee {
            0%   { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            nav ul li a { font-size: 1.5rem; }
        }
    </style>
</head>

<body>

    <script type="text/javascript">
        // Скрипт часов
        function clock() {
            const d = new Date();
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const seconds = String(d.getSeconds()).padStart(2, '0');
            
            document.getElementById("doc_time").innerText = `${hours}:${minutes}:${seconds}`;
            setTimeout(clock, 1000);
        }
        clock();

        // Скрипт для управления звуком
        var video = document.getElementById("player");
        var btn = document.getElementById("sound-btn");
        var icon = document.getElementById("sound-icon");
        var isMuted = true; // Изначально браузер может заблокировать звук, поэтому считаем, что он выключен

        // Пытаемся включить звук при загрузке, но браузер может запретить
        // Поэтому используем кнопку
        
        function toggleSound() {
            if (isMuted) {
                video.muted = false;
                icon.className = "fa fa-volume-up";
                btn.innerHTML = "<i class='fa fa-volume-up' id='sound-icon'></i> Выключить звук";
                isMuted = false;
            } else {
                video.muted = true;
                icon.className = "fa fa-volume-off";
                btn.innerHTML = "<i class='fa fa-volume-off' id='sound-icon'></i> Включить звук";
                isMuted = true;
            }
        }
        
        // Автоматическая попытка включить звук (может не сработать без клика)
        video.play().catch(error => {
            console.log("Автозапуск заблокирован, требуется клик");
        });
    </script>
